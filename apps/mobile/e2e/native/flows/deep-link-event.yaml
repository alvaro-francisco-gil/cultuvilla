# Native (Maestro) anonymous deep-link smoke — the mirror of the web
# apps/mobile/e2e/flows/deep-link-event.spec.ts. It proves the whole native
# substrate boots end to end — dev-client build + emulator-connect (via
# 10.0.2.2) + seeded data + deep-link routing — before any interaction, so a
# failure here localises native setup problems fast.
#
# Anonymous ON PURPOSE: it needs no login, so it sidesteps the native
# fixture-login mechanism (deferred to Stage 4). Only the DRIVER differs from the
# web smoke; the seeded event fixture is shared substrate.
#
# The event id/title below mirror scripts/data/seed-fixtures/e2e/fixtures.mjs
# (`event.docId` / `event.title`). Maestro YAML can't import JS — keep them in
# sync by hand, as apps/mobile/e2e/lib/fixtures.ts already does for the web side.
#
# `appId` is the dev build's Android package (app.config.ts bundleIdPerEnv.dev).
appId: com.cultuvilla.app.dev
---
- launchApp:
    clearState: true
- openLink: cultuvilla://event/e2e-event-fiesta
- assertVisible: 'Fiesta de Prueba E2E'
# Anonymous visitor gets the guest sign-up CTA (same assertion as the web smoke).
- assertVisible: 'Apuntarme'
