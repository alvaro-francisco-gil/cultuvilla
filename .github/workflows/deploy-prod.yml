name: Deploy prod

# Merges to main deploy backend + hosting to cultuvilla-prod, behind the
# `production` GitHub Environment (manual approval required).
# Skip a deploy by putting [skip-deploy] in the merge commit message.
on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip-deploy]') }}
    uses: ./.github/workflows/deploy-firebase.yml
    with:
      environment: production
      firebase_alias: prod
