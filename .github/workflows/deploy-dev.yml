name: Deploy dev

# Merges to develop deploy backend + hosting to villa-events.
# Skip a deploy by putting [skip-deploy] in the merge commit message.
on:
  push:
    branches: [develop]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip-deploy]') }}
    uses: ./.github/workflows/deploy-firebase.yml
    with:
      environment: dev
      firebase_alias: dev
