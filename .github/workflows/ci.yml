name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI builds against dev and never talks to Firebase. Placeholder values
  # satisfy the fail-fast check in packages/shared/src/config/environments.ts.
  # Real deploy values live in apps/mobile/.env on the deployer's machine
  # (Expo bakes them into the static bundle); CI does not deploy.
  NEXT_PUBLIC_APP_ENV: dev
  NEXT_PUBLIC_FIREBASE_API_KEY_DEV: ci-placeholder
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_DEV: ci.example.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID_DEV: ci-placeholder
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_DEV: ci.example.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_DEV: '0'
  NEXT_PUBLIC_FIREBASE_APP_ID_DEV: ci-placeholder

jobs:
  ci:
    name: Lint, typecheck, unit, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Typecheck (shared, functions, i18n, mobile)
        run: pnpm typecheck

      - name: Test (unit — shared, mobile, functions)
        run: pnpm test:unit

      - name: Build (shared, functions)
        run: pnpm build

  emulator-tests:
    name: Emulator tests (integration + rules + functions)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java (Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # firebase-tools@15 will drop support for Java < 21; bumping ahead
          # of the deprecation removes the runtime warning and keeps the
          # emulator job working when firebase-tools rolls forward.
          java-version: '21'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build functions
        run: pnpm functions:build

      - name: All emulator-backed tests (shared + functions + mobile, one emulator boot)
        run: pnpm test
        env:
          VITEST_RETRY_COUNT: '1'
