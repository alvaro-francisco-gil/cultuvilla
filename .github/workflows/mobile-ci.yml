name: mobile-ci

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - 'packages/i18n/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/mobile-ci.yml'
  push:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (mobile)
        run: pnpm app:typecheck

      - name: Test (mobile)
        run: pnpm app:test

      - name: Build (web export)
        env:
          # Placeholder values so app.config.ts resolves without a real .env.
          # The web build is a smoke test for "does expo export -p web succeed";
          # it does not deploy. Real values for deployed Hosting envs live in
          # the maintainer's local .env (and will move to secrets when CI deploys).
          APP_ENV: dev
          GOOGLE_IOS_CLIENT_ID_DEV: ci-placeholder.apps.googleusercontent.com
          GOOGLE_IOS_URL_SCHEME_DEV: com.googleusercontent.apps.ci-placeholder
          FIREBASE_API_KEY_DEV: ci-placeholder
          FIREBASE_AUTH_DOMAIN_DEV: ci.example.com
          FIREBASE_PROJECT_ID_DEV: ci-placeholder
          FIREBASE_STORAGE_BUCKET_DEV: ci.example.com
          FIREBASE_MESSAGING_SENDER_ID_DEV: '0'
          FIREBASE_APP_ID_DEV: ci-placeholder
        run: pnpm app:web:build
